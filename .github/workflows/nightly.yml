name: Nightly Slow Tests

on:
  schedule:
    # Runs at 02:00 UTC every night
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  slow-integration:
    name: Slow Integration Tests (Ollama)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HACKAGENT_API_KEY: ${{ secrets.HACKAGENT_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OLLAMA_MODEL: tinyllama
      TEST_MAX_TOKENS_FAST: "15"
      TEST_MAX_TOKENS_MEDIUM: "25"
      TEST_MAX_TOKENS_SLOW: "40"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Cache Ollama models
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-models-tinyllama-${{ runner.os }}
          restore-keys: |
            ollama-models-tinyllama-

      - name: Pull Ollama model
        run: ollama pull tinyllama

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run slow integration tests
        run: >
          uv run pytest
          tests/integration/adapters/
          tests/integration/attacks/
          --run-integration
          -m "slow"
          -v --tb=short
          --cov --cov-fail-under=0
          --cov-report=xml:reports/coverage-nightly.xml

      - name: Upload nightly coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-nightly
          path: reports/coverage-nightly.xml
          retention-days: 7
